name: Deploy to Production

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npx next build

      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          command_timeout: 15m
          script: |
            set -e
            cd /var/www/histmd.saltybullet.com

            # Stop services to free memory for build
            sudo systemctl stop histmd
            pkill -f "next build" || true

            # Note: invoice.saltybullet.com also runs next-server - do NOT pkill next-server

            # Pull latest
            cd /var/www/histmd.saltybullet.com
            git pull origin main

            # Install dependencies
            npm install --prefer-offline 2>&1 | tail -5
            npm rebuild better-sqlite3

            # Clean previous build
            rm -rf .next

            # Build (server ~960MB RAM, ~600MB free after stopping services)
            NODE_OPTIONS="--max-old-space-size=512" npx next build

            # Start service
            sudo systemctl start histmd
            sleep 3

            # Health check
            HTTP_CODE=$(curl -s -o /dev/null -w '%{http_code}' http://127.0.0.1:3101/)
            if [ "$HTTP_CODE" = "200" ]; then
              echo "Deploy successful!"
            else
              echo "Deploy failed with HTTP $HTTP_CODE"
              exit 1
            fi
