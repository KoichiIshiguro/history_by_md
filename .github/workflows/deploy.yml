name: Deploy to Production

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npx next build

      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          command_timeout: 10m
          script: |
            set -e
            cd /var/www/histmd.saltybullet.com

            # Stop service before updating
            sudo systemctl stop histmd

            # Pull and install
            git pull origin main
            npm ci

            # Build
            npx next build

            # Start service
            sudo systemctl start histmd
            sleep 3

            # Health check
            curl -s -o /dev/null -w 'HTTP %{http_code}' http://127.0.0.1:3101/ | grep -q '200' && echo 'Deploy successful!' || echo 'Deploy might have failed'
