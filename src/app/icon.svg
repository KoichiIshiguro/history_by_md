<!-- Simplified favicon variant. Same color palette and notebook motif as
     the PWA icon (public/icon.svg), but with chunky elements so it stays
     recognizable at 16x16 / 32x32 browser tab sizes. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="96" fill="#f97316"/>
  <rect x="112" y="96" width="288" height="320" rx="32" fill="white"/>
  <rect x="112" y="96" width="40" height="320" rx="12" fill="#f97316" opacity="0.2"/>
  <rect x="184" y="168" width="184" height="28" rx="10" fill="#f97316"/>
  <rect x="184" y="232" width="152" height="28" rx="10" fill="#fb923c"/>
  <rect x="184" y="296" width="168" height="28" rx="10" fill="#fdba74"/>
  <rect x="184" y="360" width="120" height="28" rx="10" fill="#fed7aa"/>
</svg>
